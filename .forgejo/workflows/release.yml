---
# This workflow requires a GALAXY_API_KEY secret present in the Forgejo
# repository or organization.

name: Release
'on':
  push:
    branches:
      - 'main'

defaults:
  run:
    working-directory: 'xbufu.docker'

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6
        with:
          path: 'xbufu.docker'

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install yamllint

      - name: Lint code.
        run: |
          yamllint .

  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: 'xbufu.docker'

      - name: Create latest release
        env:
          FORGEJO_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPO: ${{ forgejo.repository }}
          SERVER_URL: ${{ forgejo.server_url }}
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token $FORGEJO_TOKEN" \
            "$SERVER_URL/api/v1/repos/$REPO/releases/tags/latest" | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token $FORGEJO_TOKEN" \
              "$SERVER_URL/api/v1/repos/$REPO/releases/$RELEASE_ID"
          fi
          curl -s -X POST -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"tag_name":"latest","name":"latest","make_latest":true}' \
            "$SERVER_URL/api/v1/repos/$REPO/releases"

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ansible.
        run: pip3 install ansible-core

      - name: Delete previous role release.
        run: >-
          ansible-galaxy role delete --api-key ${{ secrets.GALAXY_API_KEY }}
          $(echo ${{ forgejo.repository }} | cut -d/ -f1) $(echo ${{ forgejo.repository }} | cut -d/ -f2)

      - name: Trigger a new import on Galaxy.
        run: >-
          ansible-galaxy role import --api-key ${{ secrets.GALAXY_API_KEY }}
          $(echo ${{ forgejo.repository }} | cut -d/ -f1) $(echo ${{ forgejo.repository }} | cut -d/ -f2)
