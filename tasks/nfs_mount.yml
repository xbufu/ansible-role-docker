---
- name: Ensure nfs-common is installed
  ansible.builtin.package:
    name: nfs-common
    state: present

- name: Ensure NFS mount point exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop: "{{ nfs_shares }}"

- name: Mount NFS share and add to fstab
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: "{{ item.opts | default('vers=4') }}"
    dump: '0'
    passno: '0'
    state: mounted
  loop: "{{ nfs_shares }}"
