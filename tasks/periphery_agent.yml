---
- name: Gather service facts
  ansible.builtin.service_facts:

- name: Ensure rsync is installed
  ansible.builtin.package:
    name: rsync
    state: present

- name: Ensure periphery root directory exists
  ansible.builtin.file:
    path: "{{ periphery_root_dir }}"
    state: directory
    mode: '0755'

- name: Install periphery agent
  ansible.builtin.shell: >-
    curl -sSfL https://raw.githubusercontent.com/moghtech/komodo/main/scripts/setup-periphery.py
    | python3 - --root-directory {{ periphery_root_dir }}
  when: "'periphery.service' not in ansible_facts.services"

- name: Stop periphery service before modifying files
  ansible.builtin.systemd:
    name: periphery
    state: stopped
    daemon_reload: true

- name: Deploy periphery config
  ansible.builtin.template:
    src: periphery.config.toml.tpl
    dest: "{{ periphery_root_dir }}/periphery.config.toml"
    mode: '0644'

- name: Sync /etc/komodo files to periphery root directory
  ansible.builtin.shell: rsync -avzP /etc/komodo/ {{ periphery_root_dir }}/
  changed_when: false

- name: Update periphery service file to use correct config path
  ansible.builtin.template:
    src: periphery.service.tpl
    dest: /etc/systemd/system/periphery.service
    mode: '0644'

- name: Ensure periphery service is enabled and started
  ansible.builtin.systemd:
    name: periphery
    state: started
    enabled: true
    daemon_reload: true
