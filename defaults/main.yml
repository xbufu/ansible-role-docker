---
docker_users:
  - "{{ ansible_user }}"
periphery_agent: true
periphery_root_dir: /mnt/docker/periphery
nfs_mount: false
nfs_shares:
  - src: ""
    path: /mnt/docker
    opts: vers=4
docker_registry_login: false
docker_registry_url: "https://index.docker.io/v1/"
docker_registry_username: ""
docker_registry_api_key: ""
